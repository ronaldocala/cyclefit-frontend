<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CycleFit+ | Training Goals</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4e6e6d", // Deep Teal
                        "sage": "#AEBFB4",
                        "background-light": "#F7F5F2",
                        "background-dark": "#171b1b",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto">
<!-- TopAppBar -->
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-primary hover:bg-primary/10 p-2 rounded-full transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h2 class="text-primary text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">CycleFit+</h2>

<!-- Main Content -->
<div class="flex-1 px-6 pt-8">
<h1 class="text-primary tracking-tight text-3xl font-bold leading-tight pb-8">Your training goals</h1>
<!-- Experience Level Section -->
<div class="mb-10">
<h3 class="text-primary/80 text-sm uppercase font-bold tracking-wider mb-4">Experience level</h3>
<div class="flex gap-3 flex-wrap">
<button class="flex h-12 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-sage px-6 border border-sage/50 shadow-sm transition-all">
<span class="text-primary font-semibold">Beginner</span>
</button>
<button class="flex h-12 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-primary/5 px-6 border border-primary/10 hover:bg-sage/20 transition-all">
<span class="text-primary/70 font-semibold">Intermediate</span>
</button>
<button class="flex h-12 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-primary/5 px-6 border border-primary/10 hover:bg-sage/20 transition-all">
<span class="text-primary/70 font-semibold">Advanced</span>
</button>
</div>
</div>
<!-- Time Available Section -->
<div class="mb-10">
<h3 class="text-primary/80 text-sm uppercase font-bold tracking-wider mb-4">Time available</h3>
<div class="flex gap-3 flex-wrap">
<button class="flex h-12 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-primary/5 px-6 border border-primary/10 hover:bg-sage/20 transition-all">
<span class="text-primary/70 font-semibold">15 mins</span>
</button>
<button class="flex h-12 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-sage px-6 border border-sage/50 shadow-sm transition-all">
<span class="text-primary font-semibold">30 mins</span>
</button>
<button class="flex h-12 shrink-0 items-center justify-center gap-x-2 rounded-xl bg-primary/5 px-6 border border-primary/10 hover:bg-sage/20 transition-all">
<span class="text-primary/70 font-semibold">45+ mins</span>
</button>
</div>
</div>
<!-- Decorative Image Section -->
<div class="mt-4 rounded-2xl overflow-hidden relative h-48 w-full border border-primary/10">
<div class="absolute inset-0 bg-gradient-to-tr from-primary/20 to-sage/30 mix-blend-multiply"></div>
<img alt="Indoor cycling bike in a bright minimalist studio" class="w-full h-full object-cover" data-alt="Indoor cycling bike in a bright minimalist studio" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDrNXqo-wvrEXASXJBye9NCwsJ7I5d4VllN2axlj_3u-CLmuwlOLeZ9WqvrbC5_4iyMjrnQrAvdkvtk8Z73NpieMvX3h1WRNP-E_Toxko6Rg4vpG5BARkTrqYWEkNZ_78Kq90qm0GVrMpAxAqSHpBMjXAd0j1O69WFvKai6D52cO7KTefdZuceVYIADlAlUMqrzOCwZTq0-er2EjFRj5t37I9g28OU0oJ4o50RUpa9Yjwywi1MX3Xw2rv8Z6gDiW4MqdPEIKv8uzlU"/>
<div class="absolute bottom-4 left-4 right-4">
<p class="text-primary text-xs font-medium bg-white/80 backdrop-blur-sm py-1 px-3 rounded-full inline-block">Personalized routines</p>
</div>
</div>
</div>
<!-- Footer Action -->
<div class="p-6 pb-10">
<button class="w-full bg-primary py-4 rounded-xl text-white font-bold text-lg shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all flex items-center justify-center gap-2">
                Continue
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-center text-primary/40 text-sm mt-6">You can change these later in settings</p>
</div>
</div>
</body></html>
